<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1e293b"/>
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9d423"/>
      <stop offset="100%" style="stop-color:#ff4e50"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Coin circle -->
  <circle cx="256" cy="220" r="140" fill="url(#coin)"/>
  <!-- Inner shadow ring -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="8"/>
  <!-- Currency symbol -->
  <text x="256" y="270" font-family="Arial, sans-serif" font-size="160" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.95)">₣</text>
  <!-- App name -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="52" font-weight="700"
        text-anchor="middle" fill="#94a3b8" letter-spacing="2">PFA</text>
</svg>
